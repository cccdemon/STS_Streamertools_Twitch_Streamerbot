<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Raid Info Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── MAIN PANEL ── right side, vertical strip */
  #raid-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 560px;
    height: 1080px;
    background: rgba(0,0,0,0.93);
    border-left: 1.5px solid rgba(0,212,255,0.35);
    pointer-events: none;
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    gap: 0;
  }

  #raid-panel.active {
    opacity: 1;
    transform: translateX(0);
  }

  /* Gold corner brackets */
  #raid-panel::before, #raid-panel::after {
    content: ''; position: absolute;
    width: 40px; height: 40px;
    border-color: #f0a500; border-style: solid;
  }
  #raid-panel::before { top:-2px; left:-2px; border-width:3px 0 0 3px; }
  #raid-panel::after  { bottom:-2px; left:-2px; border-width:0 0 3px 3px; }

  /* Cyan corner top-right */
  .panel-corner-tr {
    position: absolute; top:-2px; right:-2px;
    width:40px; height:40px;
    border:3px solid #f0a500; border-width:3px 3px 0 0;
  }
  .panel-corner-br {
    position: absolute; bottom:-2px; right:-2px;
    width:40px; height:40px;
    border:3px solid #f0a500; border-width:0 3px 3px 0;
  }

  /* Top + bottom gradient lines */
  .panel-top-line {
    position: absolute; top:0; left:40px; right:40px; height:1px;
    background: linear-gradient(90deg, transparent, #f0a500, #00d4ff, #f0a500, transparent);
    opacity: 0.7;
  }
  .panel-bottom-line {
    position: absolute; bottom:0; left:40px; right:40px; height:1px;
    background: linear-gradient(90deg, transparent, #00d4ff, #f0a500, #00d4ff, transparent);
    opacity: 0.5;
  }

  /* Animated side bar (left edge of panel) */
  .panel-bar {
    position: absolute; top:60px; bottom:60px; left:-10px; width:2px;
    background: linear-gradient(to bottom,
      transparent, rgba(0,212,255,0.6) 30%, rgba(240,165,0,0.8) 50%, rgba(0,212,255,0.6) 70%, transparent);
    animation: barPulse 3s ease-in-out infinite;
  }
  @keyframes barPulse {
    0%,100% { opacity:0.4; } 50% { opacity:1.0; }
  }

  /* Scanlines */
  .panel-scan {
    position: absolute; inset:0; pointer-events:none;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px,
      rgba(0,212,255,0.007) 3px, rgba(0,212,255,0.007) 4px);
  }

  /* ── LABEL ── */
  .raid-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 10px;
    color: #f0a500;
    text-shadow: 0 0 12px rgba(240,165,0,0.8);
    text-transform: uppercase;
    margin-bottom: 36px;
    opacity: 0.9;
  }

  /* ── AVATAR ── */
  .raid-avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 32px;
  }
  .raid-avatar-wrap::before, .raid-avatar-wrap::after {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    border-color: #f0a500; border-style: solid;
  }
  .raid-avatar-wrap::before { top:-3px; left:-3px; border-width:3px 0 0 3px; }
  .raid-avatar-wrap::after  { bottom:-3px; right:-3px; border-width:0 3px 3px 0; }

  #raidAvatar {
    width: 180px;
    height: 180px;
    border: 2px solid rgba(0,212,255,0.7);
    display: block;
    filter: drop-shadow(0 0 24px rgba(0,212,255,0.55));
  }

  /* ── NAME ── */
  #raidName {
    font-family: 'Orbitron', monospace;
    font-size: 38px;
    font-weight: 900;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0,212,255,0.9), 0 0 50px rgba(0,212,255,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
    word-break: break-all;
  }

  /* ── VIEWER BADGE ── */
  #raidViewers {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 5px;
    color: rgba(240,165,0,0.75);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── DIVIDER ── */
  .panel-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
    margin-bottom: 28px;
  }

  /* ── GAME TAG ── */
  .info-row {
    width: 100%;
    margin-bottom: 16px;
  }
  .info-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 6px;
    color: rgba(240,165,0,0.55);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .info-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    color: rgba(204,232,240,0.9);
    text-transform: uppercase;
    line-height: 1.4;
  }
  .info-val .hl { color: #f0a500; text-shadow: 0 0 8px rgba(240,165,0,0.6); }

  /* ── AI SUMMARY ── */
  #raidSummary {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: rgba(204,232,240,0.92);
    line-height: 1.55;
    text-align: left;
    text-transform: none;
    width: 100%;
    margin-top: 4px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  /* Loading dots */
  #loadingDots {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(0,212,255,0.5);
    text-align: center;
    width: 100%;
    margin-top: 4px;
    display: none;
  }
  #loadingDots.visible { display: block; }

  /* ── TWITCH URL ── */
  #raidUrl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(240,165,0,0.4);
    text-transform: lowercase;
    margin-top: 28px;
    text-align: center;
  }

  /* ── DEBUG ── */
  #dbg {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(0,212,255,0.5);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 9999;
    max-width: 400px;
  }
</style>
</head>
<body>

<!-- ── RAID INFO PANEL ── -->
<div id="raid-panel">
  <div class="panel-corner-tr"></div>
  <div class="panel-corner-br"></div>
  <div class="panel-top-line"></div>
  <div class="panel-bottom-line"></div>
  <div class="panel-bar"></div>
  <div class="panel-scan"></div>

  <div class="raid-label">// Incoming Raid</div>

  <div class="raid-avatar-wrap">
    <img id="raidAvatar" src="" alt="">
  </div>

  <div id="raidName">—</div>
  <div id="raidViewers"></div>

  <div class="panel-divider"></div>

  <div class="info-row" id="gameRow">
    <div class="info-key">// Letztes Spiel</div>
    <div class="info-val" id="raidGame">—</div>
  </div>

  <div class="panel-divider"></div>

  <div class="info-row">
    <div class="info-key">// Crew-Analyse</div>
    <div id="loadingDots">// analysiere signale ...</div>
    <div id="raidSummary"></div>
  </div>

  <div id="raidUrl"></div>
</div>

<!-- Debug -->
<div id="dbg"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const WS_HOST = params.get('host') || '192.168.178.39';
const WS_PORT = params.get('port') || '9090';
const ANTHROPIC_KEY = params.get('apikey') || '';

const panel      = document.getElementById('raid-panel');
const elName     = document.getElementById('raidName');
const elViewers  = document.getElementById('raidViewers');
const elAvatar   = document.getElementById('raidAvatar');
const elGame     = document.getElementById('raidGame');
const elSummary  = document.getElementById('raidSummary');
const elLoading  = document.getElementById('loadingDots');
const elUrl      = document.getElementById('raidUrl');
const elDbg      = document.getElementById('dbg');

let hideTimer    = null;
let typeTimer    = null;

// ─────────────────────────────────────────────
// DEBUG
// ─────────────────────────────────────────────
function dbg(msg) {
  elDbg.textContent = '// ' + msg;
  console.log('[RaidInfo]', msg);
}

// ─────────────────────────────────────────────
// WEBSOCKET
// ─────────────────────────────────────────────
let ws, reconnectDelay = 1000;

function connect() {
  dbg(`WS → ws://${WS_HOST}:${WS_PORT}`);
  ws = new WebSocket(`ws://${WS_HOST}:${WS_PORT}`);

  ws.onopen = () => {
    reconnectDelay = 1000;
    dbg('WS verbunden ✓');
  };

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.alertType === 'raid') handleRaid(d);
    } catch(_) {}
  };

  ws.onclose = () => {
    dbg(`WS getrennt – reconnect in ${reconnectDelay/1000}s`);
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  };

  ws.onerror = () => ws.close();
}

// ─────────────────────────────────────────────
// HANDLE RAID
// ─────────────────────────────────────────────
async function handleRaid(data) {
  const user    = data.user    || 'Unbekannt';
  const viewers = data.amount  || '0';
  const avatar  = data.profileImageUrl || '';
  const game    = data.game    || '';
  const bio     = data.bio     || '';

  dbg(`Raid von ${user} mit ${viewers} Viewern`);

  // Reset
  clearTimeout(hideTimer);
  clearTimeout(typeTimer);
  elSummary.textContent = '';
  elLoading.classList.remove('visible');

  // Populate
  elName.textContent    = user;
  elViewers.textContent = `// ${viewers} viewer inbound`;
  elGame.textContent    = game || '—';
  elUrl.textContent     = `twitch.tv/${user.toLowerCase()}`;

  // Avatar: URL aus Streamerbot oder Twitch-Fallback
  if (avatar) {
    elAvatar.src = avatar;
  } else {
    // Generisches Chaos-Crew Placeholder
    elAvatar.src = 'https://static-cdn.jtvnw.net/user-default-pictures-uv/ebe4cd89-b4f4-4cd9-adac-2f30151b4209-profile_image-300x300.png';
  }
  elAvatar.style.display = 'block';

  // Show panel
  panel.classList.add('active');

  // Fetch AI summary
  elLoading.classList.add('visible');
  const summary = await fetchSummary(user, game, bio);
  elLoading.classList.remove('visible');

  // Text direkt anzeigen – kein Typewriter
  elSummary.textContent = summary;

  // Auto-hide after 30s
  hideTimer = setTimeout(() => {
    panel.classList.remove('active');
  }, 15000);
}

// ─────────────────────────────────────────────
// TYPEWRITER
// ─────────────────────────────────────────────
function typeWriter(text, el, delay = 30) {
  el.textContent = '';
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      typeTimer = setTimeout(next, delay);
    }
  }
  next();
}

// ─────────────────────────────────────────────
// CLAUDE API – SUMMARY
// ─────────────────────────────────────────────
async function fetchSummary(user, game, bio) {
  if (!ANTHROPIC_KEY) {
    dbg('Kein API-Key – Fallback-Text');
    return buildFallback(user, game, bio);
  }

  const prompt = `Du bist der Bordcomputer eines Raumschiffs im Firefly-Universum.
Ein Twitch-Kanal hat gerade einen Raid gesendet. Schreibe eine kurze Crew-Analyse auf Deutsch – maximal 2 Sätze. Verwende ausschließlich den Kanalnamen, keine Pronomen (nicht er/sie/es/ihm/ihr). Normaler Satzbau, kein Markdown, keine Aufzählungen.

Streamer: ${user}
Letztes Spiel: ${game || 'unbekannt'}
Kanal-Bio: ${bio || 'keine Angaben'}

Antworte nur mit dem Analysetext.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const text = json.content?.find(b => b.type === 'text')?.text || '';
    dbg('Claude ✓');
    return text.trim();
  } catch (err) {
    dbg(`Claude Fehler: ${err.message}`);
    return buildFallback(user, game, bio);
  }
}

// ─────────────────────────────────────────────
// FALLBACK (ohne API-Key)
// ─────────────────────────────────────────────
function buildFallback(user, game, bio) {
  const gameStr = game ? `Zuletzt aktiv in ${game}. ` : '';
  const bioStr  = bio  ? `"${bio.slice(0, 100)}" ` : '';
  return `${gameStr}${bioStr}Einlass gewährt für ${user}.`;
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
connect();

// Test direkt im Browser (kein WS nötig)
const testParam = params.get('test');
if (testParam === 'raid' && !params.get('host')) {
  setTimeout(() => handleRaid({
    user:            params.get('user')   || 'SerenityPilot',
    amount:          params.get('amount') || '77',
    profileImageUrl: '',
    game:            params.get('game')   || 'Star Citizen',
    bio:             'Raumfahrer und Geschichtenerzähler. Jeden Abend im Vers unterwegs.',
  }), 500);
}
</script>
</body>
</html>
