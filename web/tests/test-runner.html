<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Chaos Crew – Test Suite</title>
<link rel="stylesheet" href="../chaos-crew-admin.css">
<style>
  body { background:#04060a; color:#c8dce8; font-family:'Rajdhani',sans-serif; padding:24px; }
  h1 { font-size:22px; letter-spacing:2px; margin-bottom:12px; }
  .subtitle { color:rgba(200,220,232,0.6); margin-bottom:24px; }
  .summary { padding:12px 16px; margin-bottom:18px; border-radius:6px; display:inline-flex; gap:12px; align-items:center; }
  .summary.pass { background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2); color:#a8ffa8; }
  .summary.fail { background:rgba(255,68,68,0.08); border:1px solid rgba(255,68,68,0.2); color:#ffb2b2; }
  #test-results { max-width:1000px; }
  .test-case { border:1px solid rgba(255,255,255,0.08); margin-bottom:10px; border-radius:6px; overflow:hidden; }
  .test-case.pass { border-color:rgba(0,255,136,0.2); background:rgba(0,255,136,0.03); }
  .test-case.fail { border-color:rgba(255,68,68,0.2); background:rgba(255,68,68,0.03); }
  .test-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:rgba(255,255,255,0.04); }
  .test-name { font-weight:700; }
  .test-status { font-family:'Share Tech Mono',monospace; font-size:12px; }
  .test-body { padding:10px 14px; font-family:'Share Tech Mono',monospace; font-size:13px; white-space:pre-wrap; }
</style>
</head>
<body>
<script>window._navBase = '../';</script>
<script src="../chaos-crew-shared.js"></script>
<script>window._sfUnitTests = true;</script>
<script src="../games/spacefight.js"></script>
<script src="../giveaway/giveaway-admin.js"></script>
<header>
  <h1>CHAOS CREW // <span>Test Suite</span></h1>
  <div class="subtitle">Browser-Unit-Tests für Shared Utilities und Navigation</div>
</header>
<div class="subtitle" style="margin-bottom:24px; color:rgba(200,220,232,0.45);">
  Diese Suite testet ausschließlich Client-seitige Utility-Funktionen. Es werden keine echten Giveaway- oder Streamer.bot-Daten verändert.
</div>
<div id="summary" class="summary pass">Tests werden ausgeführt...</div>
<div id="test-results"></div>
<script src="test-suite.js"></script>
</body>
</html>
