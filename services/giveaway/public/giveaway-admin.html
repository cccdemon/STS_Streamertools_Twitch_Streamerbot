<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Chaos Crew – Giveaway Admin</title>
<link rel="stylesheet" href="chaos-crew-admin.css">
</head>
<body>
<script src="giveaway-shared.js"></script>

<div class="page-header">
  <div class="page-title">CHAOS<span> //</span> <em>GIVEAWAY</em> ADMIN</div>
  <div class="header-stats">
    <div class="hstat"><span id="s-total">0</span><label>CREW</label></div>
    <div class="hstat"><span id="s-tickets">0</span><label>COINS</label></div>
    <div class="hstat"><span id="s-msgs">0</span><label>MSGS</label></div>
  </div>
  <div class="header-right">
    <div id="ws-badge" class="ws-badge off" onclick="reconnect()">WS: OFFLINE</div>
  </div>
</div>

<div class="gw-layout">

  <!-- ── Main: Participants ───────────────────────────── -->
  <div class="gw-main">
    <div class="gw-main-head">
      <span class="panel-label">TEILNEHMER <em id="list-count">0</em></span>
      <input type="text" id="search" placeholder="Suche..." oninput="renderTable()">
    </div>
    <div class="gw-table-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy('rank')">#</th>
          <th onclick="sortBy('name')">NAME</th>
          <th onclick="sortBy('coins')" class="sorted">COINS</th>
          <th onclick="sortBy('watchSec')">WATCHTIME</th>
          <th>AKTIONEN</th>
        </tr></thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <div class="gw-sidebar">

    <!-- Status & Controls -->
    <div class="card">
      <div class="card-title">GIVEAWAY STATUS</div>
      <div class="gw-status idle" id="gw-txt">IDLE</div>
      <div class="btn-group mt-6">
        <button class="btn btn-green" onclick="gwOpen()">ÖFFNEN</button>
        <button class="btn btn-gold"  onclick="gwClose()">SCHLIESSEN</button>
      </div>
      <button class="btn btn-cyan btn-full mt-6" onclick="drawWinner()">GEWINNER ZIEHEN</button>
    </div>

    <!-- Winner -->
    <div class="card" id="winner-card" style="display:none;">
      <div class="card-title">LETZTER GEWINNER</div>
      <div class="winner-label">// GEWINNER //</div>
      <div class="winner-name" id="w-name">-</div>
      <div class="winner-info" id="w-info"></div>
      <div class="btn-group mt-10">
        <button class="btn btn-cyan btn-sm" onclick="reroll()">REROLL</button>
        <button class="btn btn-red btn-sm"  onclick="clearWinner()">SCHLIESSEN</button>
      </div>
    </div>

    <!-- Keyword -->
    <div class="card">
      <div class="card-title">KEYWORD // TEILNAHME</div>
      <div class="kw-current">
        <span class="kw-label">AKTUELL:</span>
        <span class="kw-val" id="kw-current">-</span>
      </div>
      <div class="input-row">
        <input type="text" id="kw-input" placeholder="z.B. !mitmachen">
        <button class="btn btn-cyan btn-sm" onclick="setKeyword()">SETZEN</button>
      </div>
      <button class="btn btn-gold btn-full mt-6" onclick="clearKeyword()">DEAKTIVIEREN</button>
    </div>

    <!-- Manual Tickets -->
    <div class="card">
      <div class="card-title">MANUELL // TICKETS</div>
      <div class="input-row">
        <input type="text"   id="m-name"   placeholder="Username">
        <input type="number" id="m-amount" value="1" min="1" max="99" style="width:62px;">
      </div>
      <div class="btn-group mt-6">
        <button class="btn btn-cyan" onclick="manualAdd()">+ HINZUFÜGEN</button>
        <button class="btn btn-gold" onclick="manualSub()">– ENTFERNEN</button>
      </div>
    </div>

    <!-- First Chatter -->
    <div class="card">
      <div class="card-title">
        ERSTCHATTER
        <div id="fc-status">INAKTIV</div>
      </div>
      <button id="fc-btn" class="btn btn-cyan btn-full" onclick="toggleFirstChatter()">AKTIVIEREN</button>
    </div>

    <!-- Export -->
    <div class="card">
      <div class="card-title">EXPORT</div>
      <div class="btn-group">
        <button class="btn btn-cyan" onclick="exportCSV()">CSV</button>
        <button class="btn btn-gold" onclick="exportChances()">CHANCEN</button>
      </div>
    </div>

    <!-- Reset -->
    <div class="card">
      <div class="card-title">VERWALTUNG</div>
      <button class="btn btn-red btn-full" onclick="resetAll()">GIVEAWAY RESET</button>
    </div>

    <!-- Event Log -->
    <div class="card">
      <div class="card-title">
        EVENT LOG
        <span class="link-dim" onclick="clearLog()">CLR</span>
      </div>
      <div class="event-log" id="log"></div>
    </div>

    <!-- WS Clients -->
    <div class="card">
      <div class="card-title">WS CLIENTS</div>
      <div id="ws-clients-list"><div class="wsc-empty">Keine Clients verbunden</div></div>
      <div class="card-title mt-8">
        TRAFFIC
        <span class="link-dim" onclick="document.getElementById('ws-traffic-log').innerHTML=''">CLR</span>
      </div>
      <div class="traffic-log" id="ws-traffic-log"></div>
    </div>

  </div>
</div>

<script src="giveaway-admin.js"></script>
</body>
</html>
