<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Shoutout Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: 'Bebas Neue', sans-serif;
  }

  #so-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 560px;
    height: 1080px;
    background: rgba(0,0,0,0.93);
    border-left: 1.5px solid rgba(240,165,0,0.35);
    pointer-events: none;
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
  }

  #so-panel.active {
    opacity: 1;
    transform: translateX(0);
  }

  #so-panel::before, #so-panel::after {
    content: '';
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: #f0a500;
    border-style: solid;
  }

  #so-panel::before {
    top:-2px;
    left:-2px;
    border-width:3px 0 0 3px;
  }

  #so-panel::after {
    bottom:-2px;
    left:-2px;
    border-width:0 0 3px 3px;
  }

  .panel-corner-tr {
    position: absolute;
    top:-2px;
    right:-2px;
    width:40px;
    height:40px;
    border:3px solid #f0a500;
    border-width:3px 3px 0 0;
  }

  .panel-corner-br {
    position: absolute;
    bottom:-2px;
    right:-2px;
    width:40px;
    height:40px;
    border:3px solid #f0a500;
    border-width:0 3px 3px 0;
  }

  .panel-top-line {
    position: absolute;
    top:0;
    left:40px;
    right:40px;
    height:1px;
    background: linear-gradient(90deg, transparent, #f0a500, #00d4ff, #f0a500, transparent);
    opacity: 0.7;
  }

  .panel-bottom-line {
    position: absolute;
    bottom:0;
    left:40px;
    right:40px;
    height:1px;
    background: linear-gradient(90deg, transparent, #00d4ff, #f0a500, #00d4ff, transparent);
    opacity: 0.5;
  }

  .panel-bar {
    position: absolute;
    top:60px;
    bottom:60px;
    left:-10px;
    width:2px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(240,165,0,0.6) 30%,
      rgba(0,212,255,0.8) 50%,
      rgba(240,165,0,0.6) 70%,
      transparent
    );
    animation: barPulse 3s ease-in-out infinite;
  }

  @keyframes barPulse {
    0%,100% { opacity:0.4; }
    50% { opacity:1.0; }
  }

  .panel-scan {
    position: absolute;
    inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(240,165,0,0.006) 3px,
      rgba(240,165,0,0.006) 4px
    );
  }

  .so-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 10px;
    color: #00d4ff;
    text-shadow: 0 0 12px rgba(0,212,255,0.8);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .so-avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 32px;
  }

  .so-avatar-wrap::before,
  .so-avatar-wrap::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: #00d4ff;
    border-style: solid;
  }

  .so-avatar-wrap::before {
    top:-3px;
    left:-3px;
    border-width:3px 0 0 3px;
  }

  .so-avatar-wrap::after {
    bottom:-3px;
    right:-3px;
    border-width:0 3px 3px 0;
  }

  #soAvatar {
    width: 180px;
    height: 180px;
    border: 2px solid rgba(240,165,0,0.7);
    display: block;
    object-fit: cover;
    filter: drop-shadow(0 0 24px rgba(240,165,0,0.55));
  }

  #soName {
    font-family: 'Orbitron', monospace;
    font-size: 38px;
    font-weight: 900;
    color: #f0a500;
    text-shadow: 0 0 20px rgba(240,165,0,0.9), 0 0 50px rgba(240,165,0,0.3);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
    word-break: break-all;
  }

  #soGame {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 5px;
    color: rgba(0,212,255,0.75);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .panel-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,165,0,0.4), transparent);
    margin-bottom: 28px;
  }

  .info-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 6px;
    color: rgba(0,212,255,0.55);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #soSummary {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: rgba(204,232,240,0.92);
    line-height: 1.55;
    text-align: left;
    text-transform: none;
    width: 100%;
    word-break: break-word;
    white-space: pre-wrap;
  }

  #loadingDots {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(240,165,0,0.5);
    text-align: center;
    width: 100%;
    display: none;
  }

  #loadingDots.visible {
    display: block;
  }

  #soUrl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(0,212,255,0.4);
    margin-top: 28px;
    text-align: center;
    text-transform: lowercase;
  }

  #dbg {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(240,165,0,0.5);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<div id="so-panel">
  <div class="panel-corner-tr"></div>
  <div class="panel-corner-br"></div>
  <div class="panel-top-line"></div>
  <div class="panel-bottom-line"></div>
  <div class="panel-bar"></div>
  <div class="panel-scan"></div>

  <div class="so-label">// Shoutout</div>

  <div class="so-avatar-wrap">
    <img id="soAvatar" src="" alt="">
  </div>

  <div id="soName">—</div>
  <div id="soGame"></div>

  <div class="panel-divider"></div>

  <div style="width:100%">
    <div class="info-key">// Crew-Analyse</div>
    <div id="loadingDots">// analysiere signale ...</div>
    <div id="soSummary"></div>
  </div>

  <div id="soUrl"></div>
</div>

<div id="dbg"></div>

<script>
const params  = new URLSearchParams(location.search);

const panel     = document.getElementById('so-panel');
const elName    = document.getElementById('soName');
const elGame    = document.getElementById('soGame');
const elAvatar  = document.getElementById('soAvatar');
const elSummary = document.getElementById('soSummary');
const elLoading = document.getElementById('loadingDots');
const elUrl     = document.getElementById('soUrl');
const elDbg     = document.getElementById('dbg');

let hideTimer = null;

function dbg(msg) {
  elDbg.textContent = '// ' + msg;
  console.log('[ShoutoutInfo]', msg);
}

async function fetchTwitchUser(login) {
  const res = await fetch(`/api/twitch/user/${encodeURIComponent(login)}`);
  if (!res.ok) throw new Error(`API HTTP ${res.status}`);
  return await res.json();
}

// ── WEBSOCKET ──
let ws, reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  dbg(`WS → ${proto}//${location.host}/alerts/ws`);
  ws = new WebSocket(`${proto}//${location.host}/alerts/ws`);

  ws.onopen = () => {
    reconnectDelay = 1000;
    dbg('WS verbunden ✓');
    ws.send(JSON.stringify({ event: 'cc_identify', role: 'shoutout-overlay' }));

    const test = params.get('test');
    if (test === 'shoutout') {
      setTimeout(() => handleShoutout({
        user:            params.get('user') || 'TestStreamer',
        game:            params.get('game') || 'Star Citizen',
        bio:             params.get('bio')  || 'Ein cooler Streamer aus dem Vers.',
        profileImageUrl: '',
      }), 800);
    }
  };

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);

      if (d.event === 'shoutout') handleShoutout(d);
      if (d.alertType === 'shoutout-panel') handleShoutout(d);
    } catch (_) {}
  };

  ws.onclose = () => {
    dbg(`WS getrennt – reconnect in ${reconnectDelay / 1000}s`);
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  };

  ws.onerror = () => ws.close();
}

// ── HANDLE SHOUTOUT ──
async function handleShoutout(data) {
  const user   = data.user || 'Unbekannt';
  const game   = data.game || '';
  let bio      = data.bio || '';
  let avatar   = data.profileImageUrl || '';

  dbg(`Shoutout: ${user}`);

  clearTimeout(hideTimer);
  elSummary.textContent = '';
  elLoading.classList.remove('visible');

  elName.textContent = user;
  elGame.textContent = game ? `// ${game}` : '';
  elUrl.textContent  = `twitch.tv/${user.toLowerCase()}`;

  if (!avatar || !bio) {
    try {
      const tw = await fetchTwitchUser(user.toLowerCase());
      if (!avatar && tw.profile_image_url) avatar = tw.profile_image_url;
      if (!bio && tw.description) bio = tw.description;
      dbg(avatar ? 'Twitch User ✓' : 'Twitch User leer');
    } catch (err) {
      dbg(`Twitch User Fehler: ${err.message}`);
    }
  }

  if (avatar) {
    elAvatar.src = avatar;
    elAvatar.alt = user;
    elAvatar.style.display = 'block';
  } else {
    elAvatar.removeAttribute('src');
    elAvatar.style.display = 'none';
  }

  panel.classList.add('active');

  elLoading.classList.add('visible');
  const summary = await fetchSummary(user, game, bio);
  elLoading.classList.remove('visible');
  elSummary.textContent = summary;

  const url = `twitch.tv/${user.toLowerCase()}`;
  const prefix = `▶ Shoutout an ${user}! `;
  const suffix = ` → ${url}`;
  const maxSummary = 500 - prefix.length - suffix.length;
  const trimmed = summary.length > maxSummary
    ? summary.slice(0, maxSummary - 1) + '…'
    : summary;

  sendChat(prefix + trimmed + suffix);

  hideTimer = setTimeout(() => panel.classList.remove('active'), 15000);
}

// ── CLAUDE API (via server) ──
async function fetchSummary(user, game, bio) {
  try {
    const res = await fetch('/api/claude/summary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'shoutout', user, game, bio }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    dbg('Claude ✓');
    return json.summary || buildFallback(user, game, bio);
  } catch (err) {
    dbg(`Claude Fehler: ${err.message}`);
    return buildFallback(user, game, bio);
  }
}

function buildFallback(user, game, bio) {
  const gameStr = game ? `Zuletzt aktiv in ${game}. ` : '';
  return `${gameStr}Schaut mal bei ${user} vorbei – lohnt sich!`;
}

function sendChat(message) {
  fetch('/api/chat/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  })
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    dbg('Chat gesendet ✓');
  })
  .catch(e => dbg(`Chat Fehler: ${e.message}`));
}

connect();
</script>
</body>
</html>
