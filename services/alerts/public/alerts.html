<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
  }

  #flash {
    position: fixed;
    inset: 0;
    background: rgba(180, 0, 0, 0);
    pointer-events: none;
    z-index: 100;
    transition: background 0.08s ease;
  }

  #alert {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    opacity: 0;
    pointer-events: none;
    z-index: 150;
    width: 860px;
  }

  .alert-frame {
    position: relative;
    background: rgba(0, 0, 0, 0.88);
    border: 1.5px solid rgba(0, 212, 255, 0.45);
    padding: 30px 40px 26px;
  }

  .alert-frame::before { top: -2px; left: -2px; border-width: 2.5px 0 0 2.5px; }
  .alert-frame::after  { bottom: -2px; right: -2px; border-width: 0 2.5px 2.5px 0; }
  .alert-frame::before, .alert-frame::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: #f0a500;
    border-style: solid;
  }

  .corner-tr { top: -2px; right: -2px; border-width: 2.5px 2.5px 0 0; }
  .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 2.5px 2.5px; }
  .corner-tr, .corner-bl {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: #f0a500;
    border-style: solid;
  }

  .top-line {
    position: absolute;
    top: 0;
    left: 40px;
    right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #f0a500, #00d4ff, #f0a500, transparent);
    opacity: 0.7;
  }

  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 40px;
    right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00d4ff, #f0a500, #00d4ff, transparent);
    opacity: 0.5;
  }

  .alert-frame .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,212,255,0.012) 3px,
      rgba(0,212,255,0.012) 4px
    );
  }

  .scan-mask {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      transparent var(--sp, 0%),
      rgba(0,212,255,0.07) calc(var(--sp, 0%) + 2px),
      #000 calc(var(--sp, 0%) + 3px),
      #000 100%
    );
  }

  .alert-inner {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .avatar-wrap {
    flex-shrink: 0;
    position: relative;
    display: none;
  }
  .avatar-wrap.visible { display: block; }

  .avatar-wrap img {
    width: 90px;
    height: 90px;
    border-radius: 0;
    border: 1.5px solid #00d4ff;
    display: block;
    filter: drop-shadow(0 0 10px rgba(0,212,255,0.5));

    width: 12px;
    height: 12px;

  .avatar-wrap::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

// OBS Browser Source Audio Unlock
(function unlockObsAudio() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (Ctx) {
    const ctx = new Ctx();
    ctx.resume().then(() => ctx.close()).catch(() => {});
  }
  document.querySelectorAll('audio').forEach(el => {
    const prev = el.volume;
    el.muted = true;
    el.volume = 0;
    el.play().then(() => {
      el.pause();
      el.currentTime = 0;
      el.muted = false;
      el.volume = prev || 1;
    }).catch(() => {
      el.muted = false;
      el.volume = prev || 1;
    });
  });
}());

  if (!id) return;

}

function monthsBadge(months) {
  if (!months || months < 2) return null;
  let lbl = months + ' MONATE';
  if (months >= 12) lbl = Math.floor(months / 12) + (months >= 24 ? ' JAHRE' : ' JAHR') + (months % 12 > 0 ? ' ' + (months % 12) + 'M' : '');
  return { num: months, lbl: lbl };
}

function buildAlert(type, data) {
  const user    = data.user || data.userName || data.displayName || '???';
  const amount  = data.amount || data.bits || data.quantity || data.viewers || 0;
  const avatar  = data.avatar || data.profileImageUrl || '';
  const tier    = data.tier || '1000';
  const months  = parseInt(data.months || data.cumulativeMonths || 0, 10);
  const reward  = (data.reward || data.rewardName || '').toLowerCase().trim();
  const level   = parseInt(data.level || 1, 10);

  dbg(`AlertTyp: ${type}`, 'warn');

  switch (type) {
    case 'follow':
      return {
        label: 'NEUES CREWMITGLIED',
        user,
        userFont: 'bebas',
        msg: `<span class="highlight">${user}</span> hat sich als Crewmitglied der <span class="highlight">Chaos Crew</span> angeschlossen.<br>Du bist jetzt Teil der Lösung!`,
        avatar: '',
        avatarLarge: false,
        stat: null,
        sound: 'snd-follow',
        flash: false,
        duration: 7000,
      };

    case 'sub': {
      const highTier = (tier === '2000' || tier === '3000');
      return {
        label: highTier ? 'TIER ' + (tier === '2000' ? '2' : '3') + ' ABONNEMENT' : 'NEUES ABONNEMENT',
        user,

        user,

        avatar,
        avatarLarge: false,
        stat: cfg.stat,

        flash: cfg.flash,
        duration: 6000,
      };

    default:
      return null;

function enqueue(type, data) {
  if (type === 'shoutout') {
    showShoutout(data);
    return;
  }

  if (type === 'resub') {
    const mo = parseInt(data.months || data.cumulativeMonths || 0, 10);
    const isMilestone = MILESTONES.includes(mo);
    if (mo >= 12 || isMilestone) {
      showResubFs(data, isMilestone);
    }
  }

  if (type === 'redeem') {
    const rName = data.reward || data.rewardName || '???';
    const rUser = data.user || data.userName || '???';
    showRedeemTicker(rName, rUser);
  }

  const cfg = buildAlert(type, data);
  if (!cfg) {
    dbg(`Unbekannter AlertTyp: ${type}`, 'warn');
    return;
  }

  dbg(`Alert eingereiht: ${type} → ${data.user || data.displayName || '?'}`, 'ok');
  queue.push(cfg);
  if (!isShowing) processQueue();
}

function processQueue() {
  if (!queue.length) {
    isShowing = false;
    dbg('Queue leer', 'info');
    return;
  }
  isShowing = true;
  const next = queue.shift();
  dbg(`showAlert: ${next.label}`, 'info');

  try {
    showAlert(next);
  } catch (e) {
    dbg(`showAlert ERROR: ${e.message}`, 'err');
    console.error('[showAlert]', e);
    isShowing = false;
    setTimeout(processQueue, 500);
  }
}

function showAlert(cfg) {
  alertLabel.textContent = cfg.label;
  alertUser.textContent  = cfg.user.toUpperCase();
  alertUser.className    = 'alert-user' + (cfg.userFont === 'orbitron' ? ' orbitron' : '');
  alertMsg.innerHTML     = cfg.msg;

  if (cfg.avatar) {
    avatarImg.src = cfg.avatar;
    avatarWrap.className = 'avatar-wrap visible' + (cfg.avatarLarge ? ' large' : '');
  } else {
    avatarWrap.className = 'avatar-wrap';
  }

  if (cfg.stat) {
    statNum.textContent = cfg.stat.num;
    statLbl.textContent = cfg.stat.lbl;
    statBadge.className = 'stat-badge visible';
  } else {
    statBadge.className = 'stat-badge';
  }

  alertEl.style.transition = 'none';
  alertEl.style.opacity    = '0';
  alertEl.style.transform  = 'translateX(-50%) translateY(40px)';
  scanMask.style.setProperty('--sp', '0%');
  alertGlow.style.opacity  = '0';

  playSound(cfg.sound);

  if (cfg.flash) {
    redFlash(
      cfg.flashCount || FLASH_CNT,
      () => revealAlert(cfg),
      cfg.flashOn  || FLASH_ON,
      cfg.flashOff || FLASH_OFF
    );
  } else {
    revealAlert(cfg);
  }
}

function revealAlert(cfg) {
  setTimeout(() => {
    alertEl.style.transition = 'opacity 0.25s ease, transform 0.3s ease';
    alertEl.style.opacity    = '1';
    alertEl.style.transform  = 'translateX(-50%) translateY(0)';
    alertGlow.style.transition = 'opacity 0.5s';
    alertGlow.style.opacity  = '1';
    dbg('revealAlert: sichtbar', 'ok');
  }, 50);

  let start = null;
  function sweep(ts) {
    if (!start) start = ts;
    const pct = Math.min(((ts - start) / SCAN_MS) * 100, 100);
    scanMask.style.setProperty('--sp', pct + '%');
    if (pct < 100) requestAnimationFrame(sweep);
  }
  setTimeout(() => requestAnimationFrame(sweep), 250);

  setTimeout(() => {
    alertEl.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    alertEl.style.opacity    = '0';
    alertEl.style.transform  = 'translateX(-50%) translateY(20px)';
    alertGlow.style.opacity  = '0';
    setTimeout(() => processQueue(), 600);
  }, cfg.duration || SHOW_MS);
}

function redFlash(count, callback, flashOn = FLASH_ON, flashOff = FLASH_OFF) {
  let n = 0;
  function flash() {
    if (n >= count * 2) {
      flashEl.style.background = 'rgba(180,0,0,0)';
      callback();
      return;
    }
    const on = (n % 2 === 0);
    flashEl.style.background = on ? 'rgba(200,0,0,0.45)' : 'rgba(180,0,0,0)';
    n++;
    setTimeout(flash, on ? flashOn : flashOff);
  }
  flash();
}

function blueFlash(count, callback, flashOn = FLASH_ON, flashOff = FLASH_OFF) {
  let n = 0;
  function flash() {
    if (n >= count * 2) {
      flashEl.style.background = 'rgba(0,0,0,0)';
      callback();
      return;
    }
    const on = (n % 2 === 0);
    flashEl.style.background = on ? 'rgba(0,180,255,0.35)' : 'rgba(0,0,0,0)';
    n++;
    setTimeout(flash, on ? flashOn : flashOff);
  }
  flash();
}

function goldFlash(count, callback, flashOn = FLASH_ON, flashOff = FLASH_OFF) {
  let n = 0;
  function flash() {
    if (n >= count * 2) {
      flashEl.style.background = 'rgba(0,0,0,0)';
      callback();
      return;
    }
    const on = (n % 2 === 0);
    flashEl.style.background = on ? 'rgba(240,165,0,0.3)' : 'rgba(0,0,0,0)';
    n++;
    setTimeout(flash, on ? flashOn : flashOff);
  }
  flash();
}

    clearTimeout(dbgFadeTimer);

  }

  debugOverlay.style.opacity    = '1';

  const ph = document.getElementById('debug-placeholder');
  if (ph) ph.remove();

  dbgFadeTimer = setTimeout(() => {
    debugOverlay.style.transition = 'opacity 1.5s ease';
    debugOverlay.style.opacity    = '0';
    setTimeout(() => {
      debugLines.style.display = 'none';
      let placeholder = document.getElementById('debug-placeholder');
      if (!placeholder) {
        placeholder = document.createElement('div');
        placeholder.id = 'debug-placeholder';
        placeholder.style.cssText = 'color:rgba(240,165,0,0.25);letter-spacing:0.3em;font-size:10px;text-transform:uppercase;';
        placeholder.textContent = '// Waiting for input';

      }
      debugOverlay.style.transition = 'opacity 1s ease';

function dbg(msg, type = 'info') {
  const colors = { info: 'rgba(0,212,255,0.85)', ok: '#4ade80', warn: '#f5c518', err: '#f87171' };
  const prefix = { info: '●', ok: '✓', warn: '⚠', err: '✗' };
  const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const line = document.createElement('div');
  line.style.cssText = `color:${colors[type]};text-shadow:0 0 6px ${colors[type]}40;`;
  line.textContent = `${time}  ${prefix[type]}  ${msg}`;
  debugLines.appendChild(line);
  while (debugLines.children.length > MAX_DBG) debugLines.removeChild(debugLines.firstChild);
  console.log('[DBG]', msg);
  dbgResetFade();
}

setTimeout(() => dbgResetFade(), 100);

// WebSocket zu Streamer.bot Custom Server
let ws = null;
let wsRetryDelay = 1000;
const WS_MAX_DELAY = 10000;
let wsRetryTimer = null;
let wsConnected = false;

function wsScheduleRetry() {
  if (wsRetryTimer) return;
  wsRetryTimer = setTimeout(() => {
    wsRetryTimer = null;
    connect();
  }, wsRetryDelay);
  wsRetryDelay = Math.min(wsRetryDelay * 2, WS_MAX_DELAY);
}

function wsCleanup() {
  wsConnected = false;
  if (ws) {
    ws.onopen = null;
    ws.onmessage = null;
    ws.onclose = null;
    ws.onerror = null;
    try { ws.close(); } catch (e) {}
    ws = null;
  }
}

function handleMessage(evt) {
  try {
    console.log('RAW WS MSG', evt.data);

    const msg = JSON.parse(evt.data);
    const data = msg?.data || {};
    const source = (msg?.event?.source || '').toLowerCase();
    const type = (msg?.event?.type || '').toLowerCase();

    const logType = msg?.event?.type || msg?.alertType || msg?.request || msg?.status || '?';
    const logUser = data?.displayName || data?.userName || msg?.user || '';
    dbg(`IN: ${logType}${logUser ? ' ← ' + logUser : ''}`, 'info');

    if (msg?.alertType) {
      enqueue(msg.alertType, msg);
      return;
    }

    if (source === 'general' && type === 'custom') {
      const alertType = data.alertType || '';
      if (alertType) enqueue(alertType, data);
      return;
    }

    if      (type === 'follow')   enqueue('follow', data);
    else if (type === 'sub')      enqueue('sub', data);
    else if (type === 'resub')    enqueue('resub', data);
    else if (type === 'giftsub')  enqueue('subgift', data);
    else if (type === 'giftbomb') enqueue('subbomb', data);
    else if (type === 'cheer')    enqueue('bits', data);
    else if (type === 'redeem')    enqueue('redeem', data);

  } catch (e) {
    console.warn('[alerts] Unverarbeitete WS-Nachricht:', e.message);
  }
}

function connect() {
  wsCleanup();
  dbg(`WS → ${STREAMERBOT_WS_URL}`, 'info');

  try {
    ws = new WebSocket(STREAMERBOT_WS_URL);
  } catch (e) {
    console.error('[alerts] WebSocket creation failed', e);
    wsScheduleRetry();
    return;
  }

  ws.onopen = () => {
    dbg('WS verbunden ✓', 'ok');
    wsConnected = true;
    wsRetryDelay = 1000;

    ws.send(JSON.stringify({ event: 'cc_alert_register' }));
    dbg('Overlay registriert: cc_alert_register', 'ok');
  };

  ws.onmessage = handleMessage;

  ws.onclose = (evt) => {
    dbg(`WS getrennt (${evt.code}) – reconnect...`, 'warn');
    wsCleanup();
    wsScheduleRetry();
  };

  ws.onerror = () => {
    dbg('WS Verbindungsfehler', 'err');
  };
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wsConnected) {
    dbg('Szene aktiv – reconnect', 'info');
    if (wsRetryTimer) {
      clearTimeout(wsRetryTimer);
      wsRetryTimer = null;
    }
    connect();
  }
});

// Resub fullscreen
const resubFsEl  = document.getElementById('resub-fs');
const rfsLabel   = document.getElementById('rfsLabel');
const rfsAvatar  = document.getElementById('rfsAvatar');
const rfsName    = document.getElementById('rfsName');
const rfsBadge   = document.getElementById('rfsBadge');
const rfsMsg     = document.getElementById('rfsMsg');
let resubFsTimer = null;

function milestoneLabel(months) {
  if (months >= 12 && months % 12 === 0) {
    const years = months / 12;
    return years === 1 ? '1 JAHR AN BORD' : years + ' JAHRE AN BORD';
  }
  return months + ' MONATE AN BORD';
}

function milestoneMsg(user, months) {
  if (months === 6)  return `<span class="highlight">${user}</span> ist seit 6 Monaten Teil der Chaos Crew.<br>Halbes Jahr. <span class="highlight">Respekt, Pilot.</span>`;
  if (months === 12) return `<span class="highlight">${user}</span> überlebt ein ganzes Jahr mit uns.<br>Das verdient eine <span class="highlight">Medaille. o7</span>`;
  if (months === 24) return `<span class="highlight">${user}</span> – 2 Jahre Chaos Crew.<br>Du weißt was du dir angetan hast. <span class="highlight">Danke.</span>`;
  if (months === 36) return `3 Jahre. <span class="highlight">${user}</span> ist offiziell Teil der Möbel.<br><span class="highlight">Quantum-Veteran. Unaufhaltbar.</span>`;
  return `<span class="highlight">${user}</span> – ${months} Monate durchgehalten!<br>Die Chaos Crew <span class="highlight">salutiert.</span>`;
}

function resubMsg(user, months) {
  if (months >= 24) return `<span class="highlight">${user}</span> ist seit über 2 Jahren dabei.<br>Loyaler Pilot. <span class="highlight">Die Crew vergisst das nicht.</span>`;
  if (months >= 12) return `<span class="highlight">${user}</span> – über ein Jahr an Bord.<br><span class="highlight">Treue wie Titanpanzerung.</span>`;
  return `<span class="highlight">${user}</span> verlängert den Dienst.<br><span class="highlight">${months} Monate</span> für die Chaos Crew.`;
}

function showResubFs(data, isMilestone) {
  const user   = data.user || data.userName || data.displayName || '???';
  const avatar = data.avatar || data.profileImageUrl || '';
  const months = parseInt(data.months || data.cumulativeMonths || 0, 10);
  const dur    = isMilestone ? 13000 : 11000;

  rfsLabel.textContent = isMilestone ? '⭐ MEILENSTEIN ERREICHT' : '⟳ TREUER CREWMANN';
  rfsName.textContent = user.toUpperCase();
  rfsBadge.textContent = milestoneLabel(months);
  rfsAvatar.src = avatar;
  rfsAvatar.style.display = avatar ? 'block' : 'none';
  rfsMsg.innerHTML = isMilestone ? milestoneMsg(user, months) : resubMsg(user, months);

  const flashFn = isMilestone ? goldFlash : blueFlash;
  const flashCount = isMilestone ? 6 : 3;

  flashFn(flashCount, () => {
    resubFsEl.style.background = 'rgba(0,0,0,0.82)';
    resubFsEl.style.opacity    = '1';
    dbg(`${isMilestone ? 'Milestone' : 'Resub-FS'}: ${user} (${months}mo)`, 'ok');
  });

  if (resubFsTimer) clearTimeout(resubFsTimer);
  resubFsTimer = setTimeout(() => {
    resubFsEl.style.transition = 'opacity 0.8s ease, background 0.8s ease';
    resubFsEl.style.opacity = '0';
    setTimeout(() => {
      resubFsEl.style.background = 'rgba(0,0,0,0)';
      resubFsEl.style.transition = '';
    }, 900);
  }, dur);
}
