services:

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chaos-crew-redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - chaos-crew
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backup ────────────────────────────────────────────────
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: chaos-crew-backup
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_HOST:   api
      API_PORT:   "3000"
      KEEP_DAYS:  "30"
      TZ:         Europe/Berlin
    volumes:
      - backup_data:/backups
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chaos-crew
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node.js API (WS Bridge + REST) ───────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: chaos-crew-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SB_HOST:    ${SB_HOST:-192.168.178.39}
      SB_PORT:    ${SB_PORT:-9090}
      API_PORT:   "3000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TZ:         Europe/Berlin
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chaos-crew
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.chaos-crew.service=api"

  # ── Redis Commander (Admin UI) ────────────────────────────
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: chaos-crew-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS:   "local:redis:6379"
      HTTP_USER:     ${REDIS_UI_USER:-chaos}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD:-crewpassword}
      TZ:            Europe/Berlin
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chaos-crew
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Caddy (Web + SSL) ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chaos-crew-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN-}
      TZ: Europe/Berlin
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/${CADDY_CONFIG:-Caddyfile}:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
    networks:
      - chaos-crew
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.chaos-crew.service=web"
      - "com.chaos-crew.version=4.0"

volumes:
  redis_data:
    driver: local
  backup_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  chaos-crew:
    driver: bridge
