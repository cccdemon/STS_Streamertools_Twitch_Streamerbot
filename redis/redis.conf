# ════════════════════════════════════════════════════════
# CHAOS CREW – Redis Config
# Network only, no unix socket, persistence enabled
# ════════════════════════════════════════════════════════

# Network
bind 0.0.0.0
port 6379
unixsocket ""
protected-mode no

# Persistence – RDB snapshots
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# AOF (Append Only File) für maximale Datensicherheit
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""
